<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="description" content="Track your intermittent fasting with a clean, minimal timer">
  <title>Fast Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Fast Tracker</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="timer">Timer</button>
        <button class="tab" data-tab="body">Body</button>
        <button class="tab" data-tab="history">History</button>
      </nav>
    </header>

    <main>

      <!-- TIMER TAB -->
      <div class="tab-panel active" id="tab-timer">
        <section class="protocol-select" id="setupSection">
          <h2>Choose your fast</h2>
          <div class="protocols">
            <button class="protocol-btn active" data-hours="16">16:8</button>
            <button class="protocol-btn" data-hours="18">18:6</button>
            <button class="protocol-btn" data-hours="20">20:4</button>
            <button class="protocol-btn" data-hours="24">24h</button>
            <button class="protocol-btn" data-hours="custom">Custom</button>
          </div>
          <div class="custom-input hidden" id="customInput">
            <label for="customHours">Fasting hours</label>
            <input type="number" id="customHours" min="1" max="72" value="12" step="1">
          </div>
          <div class="start-time-row">
            <button class="start-time-toggle" id="startTimeToggle" onclick="toggleStartTime()">
              Started earlier?
            </button>
            <div class="start-time-picker hidden" id="startTimePicker">
              <label for="startTimeInput">When did you start?</label>
              <input type="datetime-local" id="startTimeInput">
            </div>
          </div>
        </section>

        <section class="timer-section">
          <div class="ring-container">
            <svg class="progress-ring" viewBox="0 0 220 220">
              <circle class="ring-bg" cx="110" cy="110" r="96"/>
              <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="96"
                stroke-dasharray="603.2"
                stroke-dashoffset="603.2"
                transform="rotate(-90 110 110)"/>
            </svg>
            <div class="ring-inner">
              <div class="elapsed-label">elapsed</div>
              <div class="time-display" id="timeDisplay">00:00:00</div>
              <div class="phase-label" id="phaseLabel">Ready to fast</div>
            </div>
          </div>

          <div class="stats">
            <div class="stat">
              <span class="stat-value" id="statGoal">16h</span>
              <span class="stat-label">goal</span>
            </div>
            <div class="stat">
              <span class="stat-value" id="statPercent">0%</span>
              <span class="stat-label">complete</span>
            </div>
            <div class="stat">
              <span class="stat-value" id="statRemaining">&#8212;</span>
              <span class="stat-label">remaining</span>
            </div>
          </div>

          <div class="controls">
            <button class="btn-start" id="startBtn" onclick="toggleFast()">Start Fast</button>
          </div>

          <div class="end-time-row" id="endTimeRow" style="display:none">
            <span>Eating window opens at <strong id="endTimeDisplay"></strong></span>
          </div>
        </section>
      </div>

      <!-- BODY TAB -->
      <div class="tab-panel" id="tab-body">
        <div class="body-intro" id="bodyIntro">
          <p>Start a fast to see what your body is doing in real time.</p>
        </div>
        <div class="current-stage-card hidden" id="currentStageCard">
          <div class="cs-label">You are currently in</div>
          <div class="cs-name" id="csName"></div>
          <div class="cs-time" id="csTime"></div>
          <div class="cs-desc" id="csDesc"></div>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>

      <!-- HISTORY TAB -->
      <div class="tab-panel" id="tab-history">
        <section class="history-section">
          <ul class="history-list" id="historyList"></ul>
          <p class="empty-history" id="emptyHistory">No fasts completed yet.</p>
        </section>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
